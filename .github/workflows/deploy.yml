name: Deploy AgencyOS

on:
  push:
    branches: [main]

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        working-directory: apps/web
        run: |
          npm install -g pnpm
          # TEMPORARY: using --no-frozen-lockfile to pick up react-dropzone and
          # recharts which were added to package.json. Revert to --frozen-lockfile
          # once pnpm-lock.yaml has been committed with those packages resolved.
          pnpm install --no-frozen-lockfile
      - name: Build
        working-directory: apps/web
        run: pnpm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy apps/web/dist --project-name=bhuiyanworkforce-app --branch=main

  # FIX: The Hono API (apps/api) was never deployed by CI — it had to be
  # deployed manually with `wrangler deploy`. This job deploys it automatically
  # on every push to main, keeping the API in sync with the frontend.
  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        working-directory: apps/api
        run: |
          npm install -g pnpm
          pnpm install --frozen-lockfile
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: apps/api
          command: deploy
