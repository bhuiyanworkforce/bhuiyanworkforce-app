name = "bhuiyanworkforce-api"
main = "src/index.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
CORS_ORIGIN = "https://app.bhuiyanworkforce.com"
API_URL     = "https://api.bhuiyanworkforce.com"

# Secrets added via Cloudflare dashboard (wrangler secret put <NAME>):
# SUPABASE_URL
# SUPABASE_SERVICE_KEY
# SUPABASE_ANON_KEY
# RESEND_API_KEY
# INTERNAL_SECRET

# ── KV namespace for rate limiting ─────────────────────────────────────────────
# FIX: Rate limiting was silently skipped because RATE_LIMIT_KV was not bound.
# The checkRateLimit() function logs a warning and skips the check when the
# binding is absent, meaning the 10-updates/60s limit was never enforced.
#
# ACTION REQUIRED — replace the placeholder id below with your real KV namespace:
#   1. Cloudflare Dashboard → Workers & Pages → KV → Create namespace
#      Name it: bhuiyanworkforce-rate-limit
#   2. Copy the namespace ID and paste it below
#   3. Commit and push — Wrangler will bind it automatically on next deploy
#
# Until you do this, rate limiting remains disabled (no functional regression).
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id      = "dd91be6b5ef64636b762dc023a94bf43"
preview_id = "dd91be6b5ef64636b762dc023a94bf43"